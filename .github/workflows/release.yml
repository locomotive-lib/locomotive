name: Release

# On every push to master: run the full test matrix.
# If pyproject.toml carries a version that is not yet on PyPI,
# additionally build, publish to PyPI, and create a GitHub release.
# Pushes without a version bump just run tests.

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  version:
    name: Check version against PyPI
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compare pyproject version with PyPI
        id: check
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/locomotive/$VERSION/json")
          if [ "$STATUS" = "404" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION is new — will publish to PyPI."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already on PyPI (HTTP $STATUS) — publish skipped."
          fi

  publish:
    name: Publish to PyPI
    needs: version
    if: needs.version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/locomotive/
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: [version, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --generate-notes
