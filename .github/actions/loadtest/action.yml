name: 'CI Load Test'
description: 'Run load tests using Locomotive library (pip install locomotive)'

inputs:
  config:
    description: 'Path to loconfig config file'
    required: false
    default: 'loconfig.json'

  users:
    description: 'Override number of users'
    required: false

  run_time:
    description: 'Override run time (e.g., 30s, 1m)'
    required: false

  set_baseline:
    description: 'Set this run as baseline and upload artifact'
    required: false
    default: 'true'

  baseline_artifact:
    description: 'Name of baseline artifact to download/upload'
    required: false
    default: 'loadtest-baseline'

  results_artifact:
    description: 'Name of results artifact to upload'
    required: false
    default: 'loadtest-results'

  post_pr_comment:
    description: 'Post results as comment to PR'
    required: false
    default: 'true'

  workflow:
    description: 'Workflow file name to search for baseline artifacts (empty = search all workflows)'
    required: false
    default: ''

  fallback_branch:
    description: 'Fallback branch for baseline when no branch-specific baseline exists'
    required: false
    default: 'main'

  github_token:
    description: 'GitHub token for posting PR comments (uses github.token if not provided)'
    required: false

outputs:
  metrics_path:
    description: 'Path to metrics.json file'
    value: ${{ steps.run.outputs.metrics_path }}

  report_path:
    description: 'Path to report.html file'
    value: ${{ steps.run.outputs.report_path }}

  status:
    description: 'Test status (PASS/WARNING/DEGRADATION)'
    value: ${{ steps.run.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        if ! command -v python3 &> /dev/null; then
          echo "Error: python3 not found!"
          echo "Please add 'Setup Python' step before using this action:"
          echo "  - name: Set up Python"
          echo "    uses: actions/setup-python@v5"
          echo "    with:"
          echo "      python-version: '3.12'"
          exit 1
        fi

        python3 -m pip install --quiet --upgrade pip
        python3 -m pip install --quiet locomotive locust

        echo "Installed:"
        python3 -m pip show locomotive | grep -E "Name|Version" || true

    - name: Resolve baseline branch
      id: resolve-branch
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BRANCH="${{ github.event.pull_request.base.ref }}"
        else
          BRANCH="${{ github.ref_name }}"
        fi
        echo "baseline_branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "Resolved baseline branch: $BRANCH"

    - name: Download baseline (branch)
      id: download-branch-baseline
      uses: dawidd6/action-download-artifact@v6
      continue-on-error: true
      with:
        github_token: ${{ inputs.github_token || github.token }}
        workflow: ${{ inputs.workflow }}
        name: ${{ inputs.baseline_artifact }}
        path: loadtest-artifacts/
        branch: ${{ steps.resolve-branch.outputs.baseline_branch }}
        workflow_conclusion: ""
        check_artifacts: true
        if_no_artifact_found: error

    - name: Download baseline (fallback)
      if: steps.download-branch-baseline.outcome != 'success' && steps.resolve-branch.outputs.baseline_branch != inputs.fallback_branch
      uses: dawidd6/action-download-artifact@v6
      continue-on-error: true
      with:
        github_token: ${{ inputs.github_token || github.token }}
        workflow: ${{ inputs.workflow }}
        name: ${{ inputs.baseline_artifact }}
        path: loadtest-artifacts/
        branch: ${{ inputs.fallback_branch }}
        workflow_conclusion: ""
        check_artifacts: true
        if_no_artifact_found: warn

    - name: Sync storage path
      shell: bash
      run: |
        STORAGE_DIR=$(python3 -c "
        import json, os, re
        cfg_path = '${{ inputs.config }}'
        ext = os.path.splitext(cfg_path)[1].lower()
        with open(cfg_path) as f:
            if ext in ('.yml', '.yaml'):
                import yaml; cfg = yaml.safe_load(f) or {}
            else:
                cfg = json.load(f)
        raw = str(cfg.get('artifacts', {}).get('storage', 'loadtest-artifacts'))
        resolved = re.sub(r'\\\$\{(\w+)(?::-([^}]*))?\}', lambda m: os.environ.get(m.group(1), m.group(2) or ''), raw)
        print(resolved)
        " 2>/dev/null || echo "loadtest-artifacts")

        echo "Config storage: $STORAGE_DIR"

        if [ "$STORAGE_DIR" != "loadtest-artifacts" ] && [ ! -e "$STORAGE_DIR" ]; then
          ln -s "$(pwd)/loadtest-artifacts" "$STORAGE_DIR"
          echo "Created symlink: $STORAGE_DIR -> loadtest-artifacts"
        else
          echo "Storage path matches download path"
        fi

    - name: Run load test
      id: run
      shell: bash
      run: |
        echo "=== Running Load Test ==="

        CMD="loco --config ${{ inputs.config }} ci"

        if [ -n "${{ inputs.users }}" ]; then
          CMD="$CMD --users ${{ inputs.users }}"
        fi

        if [ -n "${{ inputs.run_time }}" ]; then
          CMD="$CMD --run-time ${{ inputs.run_time }}"
        fi

        if [ "${{ inputs.set_baseline }}" == "true" ]; then
          CMD="$CMD --set-baseline"
        fi

        echo "Command: $CMD"
        $CMD || EXIT_CODE=$?

        echo ""
        echo "=== Exit code: ${EXIT_CODE:-0} ==="

        ARTIFACTS_DIR="loadtest-artifacts/runs"
        if [ -d "$ARTIFACTS_DIR" ]; then
          RUN_DIR=$(ls -td "$ARTIFACTS_DIR"/*/ 2>/dev/null | head -1)
          if [ -n "$RUN_DIR" ]; then
            METRICS_PATH="$RUN_DIR/metrics.json"
            REPORT_PATH="$RUN_DIR/report.html"

            if [ -f "$METRICS_PATH" ]; then
              echo "metrics_path=$METRICS_PATH" >> $GITHUB_OUTPUT
              echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT

              ANALYSIS_PATH="$RUN_DIR/analysis.json"
              if [ -f "$ANALYSIS_PATH" ]; then
                STATUS=$(python3 -c "import json; print(json.load(open('$ANALYSIS_PATH')).get('status', 'UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
                echo "status=$STATUS" >> $GITHUB_OUTPUT
              fi

              echo ""
              echo "=== Metrics ==="
              cat "$METRICS_PATH" | python3 -m json.tool || cat "$METRICS_PATH"
            fi
          fi
        fi

        exit ${EXIT_CODE:-0}
      env:
        GITHUB_SHA: ${{ github.sha }}

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.results_artifact }}-${{ github.run_id }}
        path: loadtest-artifacts/
        retention-days: 30

    - name: Trim old runs from baseline artifact
      if: inputs.set_baseline == 'true'
      shell: bash
      run: |
        BASELINE_FILE="loadtest-artifacts/baseline.json"
        if [ ! -f "$BASELINE_FILE" ]; then
          echo "No baseline.json found, skipping trim"
          exit 0
        fi
        BASELINE_RUN=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE')).get('run_id',''))" 2>/dev/null || echo "")
        if [ -z "$BASELINE_RUN" ]; then
          echo "Could not determine baseline run_id, skipping trim"
          exit 0
        fi
        echo "Keeping only baseline run: $BASELINE_RUN"
        for dir in loadtest-artifacts/runs/*/; do
          [ -d "$dir" ] || continue
          dir_name=$(basename "$dir")
          if [ "$dir_name" != "$BASELINE_RUN" ]; then
            echo "Removing old run: $dir_name"
            rm -rf "$dir"
          fi
        done

    - name: Upload baseline
      if: inputs.set_baseline == 'true' && always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.baseline_artifact }}
        path: loadtest-artifacts/
        retention-days: 90

    - name: Post PR comment
      if: github.event_name == 'pull_request' && inputs.post_pr_comment == 'true' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const artifactsDir = 'loadtest-artifacts/runs';
          if (!fs.existsSync(artifactsDir)) {
            console.log('No artifacts found, skipping comment');
            return;
          }

          const runs = fs.readdirSync(artifactsDir)
            .map(run => path.join(artifactsDir, run))
            .filter(run => fs.statSync(run).isDirectory())
            .sort((a, b) => fs.statSync(b).mtime - fs.statSync(a).mtime);

          if (runs.length === 0) {
            console.log('No runs found, skipping comment');
            return;
          }

          const metricsPath = path.join(runs[0], 'metrics.json');
          if (!fs.existsSync(metricsPath)) {
            console.log('No metrics found, skipping comment');
            return;
          }

          const metrics = JSON.parse(fs.readFileSync(metricsPath, 'utf8'));
          const analysisPath = path.join(runs[0], 'analysis.json');

          const fmt = (val) => val == null ? 'N/A' : typeof val === 'number' ? val.toFixed(2) : String(val);

          const rps = fmt(metrics.rps);
          const avgMs = fmt(metrics.avg_ms);
          const p95Ms = fmt(metrics.p95_ms);
          const errorRate = fmt(metrics.error_rate);
          const requests = metrics.requests || 'N/A';

          let statusEmoji = '';
          let statusText = 'Unknown';

          if (fs.existsSync(analysisPath)) {
            const analysis = JSON.parse(fs.readFileSync(analysisPath, 'utf8'));
            const status = analysis.status || 'UNKNOWN';
            if (status === 'PASS') {
              statusEmoji = 'PASS';
              statusText = 'Passed';
            } else if (status === 'WARNING') {
              statusEmoji = 'WARNING';
              statusText = 'Warning';
            } else if (status === 'DEGRADATION') {
              statusEmoji = 'FAIL';
              statusText = 'Degradation';
            } else {
              statusText = status;
            }
          } else {
            const errRate = parseFloat(metrics.error_rate) || 0;
            if (errRate < 5) {
              statusEmoji = 'PASS';
              statusText = 'Passed';
            } else {
              statusEmoji = 'FAIL';
              statusText = 'Failed';
            }
          }

          const runId = process.env.GITHUB_RUN_ID || 'unknown';
          const body = [
            `## Load Test Results — ${statusText}`,
            '',
            '| Metric | Value |',
            '|--------|-------|',
            `| RPS | ${rps} |`,
            `| Avg Response | ${avgMs} ms |`,
            `| P95 Response | ${p95Ms} ms |`,
            `| Error Rate | ${errorRate}% |`,
            `| Total Requests | ${requests} |`,
            '',
            `[View full report](../actions/runs/${runId})`
          ].join('\n');

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
